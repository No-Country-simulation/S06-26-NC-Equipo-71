server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: appbit-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/appbit_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    
  jpa:
    hibernate:
      ddl-auto: validate

logging:
  level:
    org-flywaydb: INFO

jwt:
  secret: ${JWT_SECRET:1234567890123456789012345678901234567890123456789012345678901234}
  expiration: 86400000

    