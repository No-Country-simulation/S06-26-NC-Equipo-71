services:
  postgres:
    image: postgres:16-alpine
    container_name: appbit_postgres_local
    environment:
      POSTGRES_DB: appbit_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - appbit_postgres_data:/var/lib/postgresql/data

  visent-loader:
    build:
      context: .
      dockerfile: Dockerfile.visent-loader
    container_name: appbit_visent_loader
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: appbit_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      VISENT_DATA_DIR: /app/data/visent
    volumes:
      - ./data/visent:/app/data/visent
    profiles:
      - loader

volumes:
  appbit_postgres_data: