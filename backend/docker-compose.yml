services:
  postgres:
    image: postgres:16-alpine
    container_name: appbit_postgres_local
    environment:
      POSTGRES_DB: appbit_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - appbit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appbit_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  visent-loader:
    build:
      context: .
      dockerfile: Dockerfile.visent-loader
    container_name: appbit_visent_loader
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: appbit_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      VISENT_DATA_DIR: /app/data/visent
    volumes:
      - ./data/visent:/app/data/visent
    profiles:
      - loader

volumes:
  appbit_postgres_data: